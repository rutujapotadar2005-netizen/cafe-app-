<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Eye Café — Login / Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">👁 <span>Red</span> Eye Café</a>
  <ul class="nav-links">
    <li><a href="index.html" data-page="index.html">Home</a></li>
    <li><a href="menu.html" data-page="menu.html">Menu</a></li>
    <li><a href="about.html" data-page="about.html">About Us</a></li>
    <li><a href="contact.html" data-page="contact.html">Contact</a></li>
  </ul>
  <div class="nav-actions">
    <div id="auth-btns" style="display:flex; gap:0.5rem;">
      <button class="btn btn-outline" onclick="switchTab('login')">Login</button>
      <button class="btn btn-red" onclick="switchTab('register')">Register</button>
    </div>
    <div id="user-display" style="display:none;" class="user-indicator">
      <span>👤</span> <span id="username-text"></span>
      <button class="btn btn-outline" onclick="logout()" style="margin-left:0.5rem; padding:0.35rem 0.8rem; font-size:0.72rem;">Logout</button>
    </div>
  </div>
</nav>

<!-- AUTH CARD -->
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">👁 <span>Red</span> Eye Café</div>
    <div class="auth-sub">Your coffee, your account</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="form-login">
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="your@email.com">
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn btn-red btn-full" style="margin-top:0.5rem;" onclick="doLogin()">Login to Red Eye →</button>
      <div class="auth-footer">Don't have an account? <a onclick="switchTab('register')">Register now</a></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="form-register">
      <div class="auth-group">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Your full name">
      </div>
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="your@email.com">
      </div>
      <div class="auth-group">
        <label>Phone Number</label>
        <input type="tel" id="r-phone" placeholder="+91 98765 43210">
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <button class="btn btn-red btn-full" style="margin-top:0.5rem;" onclick="doRegister()">Create Account →</button>
      <div class="auth-footer">Already have an account? <a onclick="switchTab('login')">Login</a></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  // Check URL param to default to register tab
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('tab') === 'register') switchTab('register');

  // If already logged in, redirect home
  if (currentUser) window.location.href = 'index.html';

  function switchTab(tab) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('form-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  async function doLogin() {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    if (!email || !pass) { showToast('Please fill all fields'); return; }

    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      sessionStorage.setItem('redeye_user', JSON.stringify(data.user));
      showToast('Welcome back, ' + data.user.name.split(' ')[0] + '! ☕');
      const pending = sessionStorage.getItem('redeye_pending');
      setTimeout(() => {
        window.location.href = pending ? 'menu.html' : 'index.html';
      }, 800);
    } else {
      showToast(data.message);
    }
  }

  async function doRegister() {
    const name  = document.getElementById('r-name').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const phone = document.getElementById('r-phone').value.trim();
    const pass  = document.getElementById('r-pass').value;
    if (!name || !email || !pass) { showToast('Please fill all required fields'); return; }
    if (pass.length < 6) { showToast('Password must be 6+ characters'); return; }

    const res  = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      sessionStorage.setItem('redeye_user', JSON.stringify(data.user));
      showToast('Welcome, ' + data.user.name.split(' ')[0] + '! ☕');
      setTimeout(() => window.location.href = 'index.html', 800);
    } else {
      showToast(data.message);
    }
  }
</script>
</body>
</html>
